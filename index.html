<script>
/* ============================================================
   20) الامتحانات والدرجات
   ============================================================ */
PageRenderers.exams = function(){
  let groups = DB.list('groups');
  if(Auth.user.role==='teacher' && Auth.user.linkedId) groups = groups.filter(g=>g.teacherId===Auth.user.linkedId);
  const exams = DB.list('exams').filter(e=> groups.find(g=>g.id===e.groupId)).sort((a,b)=>b.createdAt-a.createdAt);
  return `<div class="table-wrap">
    <div class="table-toolbar"><div class="spacer"></div><button class="btn btn-primary btn-sm" onclick="Exams.openForm()">+ امتحان جديد</button></div>
    ${exams.length? `<div style="overflow-x:auto;"><table><thead><tr><th>الامتحان</th><th>المجموعة</th><th>الدرجة العظمى</th><th>متوسط الدرجات</th><th>تاريخ</th><th></th></tr></thead><tbody>
    ${exams.map(e=>{
      const g = DB.get('groups', e.groupId);
      const results = DB.list('examResults').filter(r=>r.examId===e.id);
      const avg = results.length? Math.round(results.reduce((s,r)=>s+Number(r.score||0),0)/results.length) : 0;
      return `<tr style="cursor:pointer" onclick="Exams.openResults('${e.id}')">
        <td><b>${Utils.esc(e.title)}</b></td><td>${Utils.esc(g?.name||'—')}</td><td>${e.fullMark}</td>
        <td>${results.length? avg+' / '+e.fullMark : '—'}</td><td>${Utils.fmtDate(e.date)}</td>
        <td onclick="event.stopPropagation()"><button class="icon-btn" onclick="Exams.remove('${e.id}')">🗑️</button></td>
      </tr>`;
    }).join('')}</tbody></table></div>` : `<div class="empty-state"><div class="ic">📝</div>لا يوجد امتحانات بعد</div>`}
  </div>`;
};
const Exams = {};
Exams.openForm = function(){
  let groups = DB.list('groups');
  if(Auth.user.role==='teacher' && Auth.user.linkedId) groups = groups.filter(g=>g.teacherId===Auth.user.linkedId);
  UI.modal(`<div class="modal-head"><h3>إنشاء امتحان</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
  <div class="modal-body"><div class="form-grid">
    <div class="field full"><label>اسم الامتحان</label><input id="f_title" placeholder="امتحان الشهر - وحدة 1"></div>
    <div class="field"><label>المجموعة</label><select id="f_group">${groups.map(g=>`<option value="${g.id}">${Utils.esc(g.name)}</option>`).join('')}</select></div>
    <div class="field"><label>الدرجة العظمى</label><input id="f_full" type="number" value="20"></div>
  </div></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="UI.closeModal()">إلغاء</button><button class="btn btn-primary" onclick="Exams.save()">إنشاء</button></div>`);
};
Exams.save = async function(){
  const title=document.getElementById('f_title').value.trim();
  const groupId=document.getElementById('f_group').value;
  const fullMark=Number(document.getElementById('f_full').value)||20;
  if(!title||!groupId){ UI.toast('اكمل البيانات','err'); return; }
  const id = await DB.add('exams', {title, groupId, fullMark, date:Utils.todayISO()});
  DB.log('إنشاء امتحان', title);
  UI.toast('تم إنشاء الامتحان'); UI.closeModal();
  setTimeout(()=>Exams.openResults(id), 200);
};
Exams.remove = function(id){ UI.confirm('هتحذف الامتحان وكل الدرجات المرتبطة به، متأكد؟', async()=>{
  await DB.remove('exams', id);
  const results = DB.list('examResults').filter(r=>r.examId===id);
  for(const r of results) await DB.remove('examResults', r.id);
  UI.toast('تم الحذف');
});};
Exams.openResults = function(examId){
  const e = DB.get('exams', examId);
  const g = DB.get('groups', e.groupId);
  const studentIds = g.studentIds? Object.keys(g.studentIds):[];
  const results = {}; DB.list('examResults').filter(r=>r.examId===examId).forEach(r=>results[r.studentId]=r.score);
  UI.modal(`<div class="modal-head"><h3>درجات ${Utils.esc(e.title)}</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
  <div class="modal-body">
    ${studentIds.length? studentIds.map(sid=>{
      const st = DB.get('students', sid); if(!st) return '';
      return `<div class="notif-item" style="align-items:center;"><div class="ic">🎓</div>
        <div style="flex:1;"><b>${Utils.esc(st.name)}</b></div>
        <input type="number" min="0" max="${e.fullMark}" value="${results[sid]??''}" placeholder="من ${e.fullMark}" style="width:90px; padding:8px 10px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg); color:var(--text);" onchange="Exams.saveScore('${examId}','${sid}',this.value)">
      </div>`;
    }).join('') : '<div class="empty-state"><div class="ic">🎓</div>لا يوجد طلاب</div>'}
  </div>
  <div class="modal-foot"><button class="btn btn-primary" onclick="UI.closeModal()">تم</button></div>`, {wide:true});
};
Exams.saveScore = async function(examId, studentId, val){
  const score = Number(val)||0;
  await DB.set('examResults', examId+'_'+studentId, {examId, studentId, score});
  const st = DB.get('students', studentId);
  const e = DB.get('exams', examId);
  UI.notify({title:'نتيجة امتحان', body:`${st?.name} حصل على ${score}/${e.fullMark} في ${e.title}`, role:'owner', type:'info'});
  UI.toast('تم حفظ الدرجة');
};

/* ============================================================
   21) الإشعارات
   ============================================================ */
PageRenderers.notifications = function(){
  const mine = DB.list('notifications').filter(n=> n.role===Auth.user.role || n.userId===Auth.user.id || (!n.role && !n.userId) || Auth.user.role==='owner').sort((a,b)=>b.createdAt-a.createdAt).slice(0,80);
  return `<div class="table-wrap">
    <div class="table-toolbar"><span class="text-dim" style="font-size:12.5px;">${mine.filter(n=>!n.read).length} إشعار غير مقروء</span><div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="Notifs.markAllRead()">تحديد الكل كمقروء</button></div>
    ${mine.length? mine.map(n=>`<div class="notif-item ${n.read?'':'unread'}" style="cursor:pointer" onclick="Notifs.markRead('${n.id}')">
      <div class="ic">${n.type==='ok'?'✅':n.type==='err'?'🚫':'🔔'}</div>
      <div style="flex:1;"><b>${Utils.esc(n.title)}</b><div class="text-dim" style="font-size:12.5px;">${Utils.esc(n.body||'')}</div></div>
      <small class="text-faint">${Utils.fmtDateTime(n.createdAt)}</small>
    </div>`).join('') : `<div class="empty-state"><div class="ic">🔔</div>لا يوجد إشعارات</div>`}
  </div>`;
};
const Notifs = {};
Notifs.markRead = function(id){ DB.update('notifications', id, {read:true}); };
Notifs.markAllRead = function(){ DB.list('notifications').forEach(n=>{ if(!n.read) DB.update('notifications', n.id, {read:true}); }); UI.toast('تم تحديد الكل كمقروء'); };

/* ============================================================
   22) المستخدمين والصلاحيات (Owner فقط)
   ============================================================ */
PageRenderers.users = function(){
  if(Auth.user.role!=='owner') return `<div class="empty-state"><div class="ic">🔒</div>هذه الصفحة لصاحب السنتر فقط</div>`;
  const all = DB.list('users');
  return `<div class="table-wrap">
    <div class="table-toolbar"><div class="spacer"></div><button class="btn btn-primary btn-sm" onclick="UsersMgmt.openForm()">+ حساب جديد</button></div>
    <div style="overflow-x:auto;"><table><thead><tr><th>الاسم</th><th>اسم الدخول</th><th>الدور</th><th>الحالة</th><th></th></tr></thead><tbody>
    ${all.map(u=>`<tr><td><b>${Utils.esc(u.name)}</b></td><td>${Utils.esc(u.username||u.phone||'—')}</td><td><span class="pill blue">${ROLE_LABELS[u.role]||u.role}</span></td>
    <td>${u.active===false? '<span class="pill red">موقوف</span>':'<span class="pill green">نشط</span>'}</td>
    <td><div class="row-actions">
      <button class="icon-btn" onclick="UsersMgmt.openForm('${u.id}')">✏️</button>
      ${u.id!==Auth.user.id?`<button class="icon-btn" onclick="UsersMgmt.toggleActive('${u.id}')">⏻</button>`:''}
    </div></td></tr>`).join('')}
    </tbody></table></div>
  </div>`;
};
const UsersMgmt = {};
UsersMgmt.openForm = function(id){
  const u = id? DB.get('users', id):{};
  const linkables = {teacher:DB.list('teachers'), employee:DB.list('employees')};
  UI.modal(`<div class="modal-head"><h3>${id?'تعديل حساب':'حساب دخول جديد'}</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
  <div class="modal-body"><div class="form-grid">
    <div class="field full"><label>الاسم</label><input id="f_name" value="${Utils.esc(u.name||'')}"></div>
    <div class="field"><label>اسم الدخول / الهاتف</label><input id="f_username" value="${Utils.esc(u.username||'')}"></div>
    <div class="field"><label>كلمة المرور</label><input id="f_pass" type="text" value="${Utils.esc(u.password||'')}" placeholder="${id?'اتركها فارغة لعدم التغيير':''}"></div>
    <div class="field full"><label>الدور</label><select id="f_role">
      ${Object.entries(ROLE_LABELS).filter(([k])=>k!=='owner').map(([k,v])=>`<option value="${k}" ${u.role===k?'selected':''}>${v}</option>`).join('')}
    </select></div>
  </div></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="UI.closeModal()">إلغاء</button><button class="btn btn-primary" onclick="UsersMgmt.save('${id||''}')">${id?'حفظ':'إنشاء'}</button></div>`);
};
UsersMgmt.save = async function(id){
  const name=document.getElementById('f_name').value.trim();
  const username=document.getElementById('f_username').value.trim();
  const pass=document.getElementById('f_pass').value.trim();
  const role=document.getElementById('f_role').value;
  if(!name||!username||(!pass&&!id)){ UI.toast('اكمل البيانات','err'); return; }
  const data = {name, username, role, active:true};
  if(pass) data.password = pass;
  if(id) await DB.update('users', id, data); else { data.password=pass; await DB.add('users', data); }
  UI.toast('تم الحفظ'); UI.closeModal();
};
UsersMgmt.toggleActive = async function(id){
  const u = DB.get('users', id);
  await DB.update('users', id, {active: u.active===false});
  UI.toast(u.active===false? 'تم تفعيل الحساب':'تم إيقاف الحساب');
};
</script>
<script>
/* ============================================================
   23) الإعدادات
   ============================================================ */
PageRenderers.settings = function(){
  if(!(Auth.user.role==='owner'||Auth.user.role==='admin')) return `<div class="empty-state"><div class="ic">🔒</div>لا تملك صلاحية الوصول لهذه الصفحة</div>`;
  const s = centerSettings();
  return `<div class="card" style="max-width:520px;">
    <h3 class="mt0">بيانات السنتر</h3>
    <div class="field"><label>اسم السنتر</label><input id="s_name" value="${Utils.esc(s.centerName||'')}"></div>
    <div class="field"><label>العنوان</label><input id="s_address" value="${Utils.esc(s.address||'')}"></div>
    <div class="field"><label>هاتف السنتر</label><input id="s_phone" value="${Utils.esc(s.phone||'')}"></div>
    <div class="field"><label>نصيب السنتر الثابت من كل حصة حضور (ج.م)</label><input id="s_cut" type="number" value="${s.centerCutPerStudent||15}"></div>
    <button class="btn btn-primary btn-block" onclick="SettingsPage.save()">حفظ الإعدادات</button>
  </div>
  <div class="card" style="max-width:520px; margin-top:16px;">
    <h3 class="mt0">المظهر</h3>
    <div class="flex gap8"><button class="btn btn-outline" onclick="UI.toggleTheme()">🌙 تبديل الوضع الليلي/النهاري</button></div>
  </div>
  <div class="card" style="max-width:520px; margin-top:16px;">
    <h3 class="mt0">سجل العمليات (Audit Log)</h3>
    <div style="max-height:260px; overflow-y:auto;">
    ${DB.list('auditLogs').sort((a,b)=>b.ts-a.ts).slice(0,40).map(l=>`<div class="kv"><b>${Utils.esc(l.action)}</b><span class="text-dim" style="font-size:12px;">${Utils.esc(l.userName||'')} · ${Utils.fmtDateTime(l.ts)}</span></div>`).join('') || '<div class="text-dim" style="font-size:13px;">لا يوجد سجل بعد</div>'}
    </div>
  </div>`;
};
const SettingsPage = {};
SettingsPage.save = async function(){
  const data = {
    centerName: document.getElementById('s_name').value.trim(),
    address: document.getElementById('s_address').value.trim(),
    phone: document.getElementById('s_phone').value.trim(),
    centerCutPerStudent: Number(document.getElementById('s_cut').value)||15,
  };
  await rtdb.ref('settings').update(data);
  DB.log('تحديث إعدادات السنتر', data.centerName);
  UI.toast('تم حفظ الإعدادات');
};

/* ============================================================
   24) التقارير
   ============================================================ */
PageRenderers.reports = function(){
  const students = DB.list('students'), teachers = DB.list('teachers');
  const attendance = DB.list('attendance');
  const payments = DB.list('payments'), expenses = DB.list('expenses');
  const totalRevenue = payments.reduce((s,p)=>s+Number(p.amount||0),0);
  const totalExpenses = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const attendanceRate = attendance.length? Math.round(attendance.filter(a=>a.status==='present').length/attendance.length*100):0;

  return `
  <div class="grid g4" style="margin-bottom:20px;">
    ${statCard('🎓','var(--brand)','var(--brand-soft)', students.length, 'الطلاب')}
    ${statCard('📈','var(--blue)','var(--blue-soft)', attendanceRate+'%', 'نسبة الحضور العامة')}
    ${statCard('💵','var(--brand)','var(--brand-soft)', Utils.money(totalRevenue), 'إجمالي التحصيل')}
    ${statCard('🧾','var(--red)','var(--red-soft)', Utils.money(totalExpenses), 'إجمالي المصروفات')}
  </div>
  <div class="section-title mt0"><h3>تصدير التقارير</h3></div>
  <div class="grid g3">
    <div class="card"><b>تقرير الطلاب</b><p class="text-dim" style="font-size:12.5px;">بيانات كل الطلاب وحالتهم المالية والحضور</p><button class="btn btn-outline btn-sm" onclick="Reports.exportStudents()">⬇️ تصدير CSV</button></div>
    <div class="card"><b>تقرير المدفوعات</b><p class="text-dim" style="font-size:12.5px;">كل عمليات التحصيل المسجلة</p><button class="btn btn-outline btn-sm" onclick="Reports.exportPayments()">⬇️ تصدير CSV</button></div>
    <div class="card"><b>تقرير الحضور</b><p class="text-dim" style="font-size:12.5px;">سجل الحضور والغياب الكامل</p><button class="btn btn-outline btn-sm" onclick="Reports.exportAttendance()">⬇️ تصدير CSV</button></div>
  </div>
  <div class="section-title"><h3>مقارنة إيراد كل مدرس</h3></div>
  <div class="card"><div class="mini-chart-wrap"><canvas id="teacherRevChart"></canvas></div></div>
  `;
};
PageAfterRender.reports = function(){
  const teachers = DB.list('teachers');
  const data = teachers.map(t=>TeacherDues.calcDue(t.id).totalRevenue);
  const c = document.getElementById('teacherRevChart');
  if(c){
    new Chart(c, {type:'bar', data:{labels:teachers.map(t=>t.name), datasets:[{data, backgroundColor:'#0E9F6E', borderRadius:6}]},
      options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{color:'rgba(120,130,160,.1)'}}, x:{grid:{display:false}}}}});
  }
};
const Reports = {};
Reports._download = function(filename, rows){
  const csv = '\uFEFF' + rows.map(r=> r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
};
Reports.exportStudents = function(){
  const rows = [['الاسم','الكود','المرحلة','الهاتف','هاتف ولي الأمر','المديونية']];
  DB.list('students').forEach(s=> rows.push([s.name,s.code,s.stage,s.phone,s.parentPhone,s.debt||0]));
  Reports._download('students.csv', rows);
};
Reports.exportPayments = function(){
  const rows = [['الطالب','المبلغ','التاريخ','الطريقة']];
  DB.list('payments').forEach(p=>{ const s=DB.get('students',p.studentId); rows.push([s?.name||'',p.amount,p.date,p.method]); });
  Reports._download('payments.csv', rows);
};
Reports.exportAttendance = function(){
  const rows = [['الطالب','التاريخ','الحالة']];
  DB.list('attendance').forEach(a=>{ const s=DB.get('students',a.studentId); rows.push([s?.name||'',a.date,a.status==='present'?'حاضر':'غائب']); });
  Reports._download('attendance.csv', rows);
};

/* ============================================================
   25) صفحة الطالب / ولي الأمر (بوابة اطّلاع فقط)
   ============================================================ */
PageRenderers.myProfile = function(){
  let student = null;
  if(Auth.user.role==='student'){ student = DB.get('students', Auth.user.linkedId); }
  else if(Auth.user.role==='parent'){
    const kids = DB.list('students').filter(s=>s.parentPhone===Auth.user.username || s.parentPhone===Auth.user.phone);
    if(kids.length) student = kids[0];
  }
  if(!student) return `<div class="empty-state"><div class="ic">🎓</div>لا يوجد بيانات مرتبطة بهذا الحساب — تواصل مع إدارة السنتر</div>`;
  const att = DB.list('attendance').filter(a=>a.studentId===student.id);
  const present = att.filter(a=>a.status==='present').length;
  const pct = att.length? Math.round(present/att.length*100):0;
  const results = DB.list('examResults').filter(r=>r.studentId===student.id);
  return `
  <div class="grid g3">
    ${statCard('📊','var(--brand)','var(--brand-soft)', pct+'%', 'نسبة الحضور')}
    ${statCard('✅','var(--blue)','var(--blue-soft)', present, 'مرات الحضور')}
    ${statCard('💳','var(--amber)','var(--amber-soft)', Utils.money(student.debt||0), 'المديونية الحالية')}
  </div>
  <div class="section-title"><h3>الدرجات</h3></div>
  <div class="table-wrap">
  ${results.length? results.map(r=>{ const e=DB.get('exams',r.examId); return `<div class="kv"><b>${Utils.esc(e?.title||'')}</b><span>${r.score}/${e?.fullMark||''}</span></div>`; }).join('') : '<div class="empty-state"><div class="ic">📝</div>لا يوجد درجات مسجلة بعد</div>'}
  </div>
  <div class="section-title"><h3>آخر سجل حضور</h3></div>
  <div class="table-wrap">
  ${att.sort((a,b)=>b.createdAt-a.createdAt).slice(0,10).map(a=>`<div class="kv"><b>${Utils.fmtDate(a.date)}</b><span class="pill ${a.status==='present'?'green':'red'}">${a.status==='present'?'حاضر':'غائب'}</span></div>`).join('') || '<div class="empty-state"><div class="ic">📭</div>لا يوجد سجل بعد</div>'}
  </div>`;
};
</script>
