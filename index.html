<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>نبض | نظام إدارة السناتر التعليمية</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F5F7FB;
  --bg-alt:#FFFFFF;
  --surface:#FFFFFF;
  --surface-2:#EEF1F8;
  --border:#E3E7F1;
  --text:#161A2E;
  --text-dim:#6B7290;
  --text-faint:#9BA0BE;
  --brand:#0E9F6E;
  --brand-dark:#0A7F58;
  --brand-soft:#E3F8EF;
  --indigo:#3B4790;
  --amber:#E8A33D;
  --amber-soft:#FCF1DE;
  --red:#E24C4B;
  --red-soft:#FCE8E8;
  --blue:#3B6DE0;
  --blue-soft:#E8EFFC;
  --shadow: 0 1px 2px rgba(20,24,50,.04), 0 8px 24px -8px rgba(20,24,50,.10);
  --shadow-lg: 0 20px 60px -20px rgba(20,24,50,.28);
  --radius: 16px;
  --radius-sm: 10px;
  --font-head:'Cairo',sans-serif;
  --font-body:'Tajawal',sans-serif;
}
html.dark{
  --bg:#0D1020;
  --bg-alt:#131730;
  --surface:#161A36;
  --surface-2:#1E2344;
  --border:#282E54;
  --text:#EEF0FB;
  --text-dim:#A6ACD4;
  --text-faint:#6C7299;
  --brand:#17C98A;
  --brand-dark:#0EA36E;
  --brand-soft:#0F3A2C;
  --indigo:#8C9AFF;
  --amber:#F0B94F;
  --amber-soft:#3A2E12;
  --red:#F16665;
  --red-soft:#3B1B1D;
  --blue:#6C93F5;
  --blue-soft:#16204A;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 30px -10px rgba(0,0,0,.5);
  --shadow-lg: 0 30px 80px -20px rgba(0,0,0,.65);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--font-body);
  transition:background .25s ease, color .25s ease;
  overflow-x:hidden;
}
h1,h2,h3,h4,.brand-font{font-family:var(--font-head);}
::selection{background:var(--brand); color:#fff;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px;}

/* ---------- Loading ---------- */
#bootLoader{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:var(--bg); z-index:9999; flex-direction:column; gap:14px;}
.pulse-dot{width:54px; height:54px; border-radius:50%; background:var(--brand); position:relative;}
.pulse-dot::after{content:''; position:absolute; inset:0; border-radius:50%; background:var(--brand); animation:pulseRing 1.4s ease-out infinite;}
@keyframes pulseRing{0%{transform:scale(1); opacity:.7;} 100%{transform:scale(2.4); opacity:0;}}
#bootLoader span{color:var(--text-dim); font-size:14px;}

/* ---------- Login ---------- */
#loginScreen{position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:var(--bg); z-index:500; padding:20px;}
#loginScreen.show{display:flex;}
.login-card{width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:38px 30px; box-shadow:var(--shadow-lg); position:relative; overflow:hidden;}
.login-card::before{content:''; position:absolute; top:-60px; right:-60px; width:180px; height:180px; border-radius:50%; background:radial-gradient(circle, var(--brand-soft), transparent 70%);}
.login-logo{width:56px; height:56px; border-radius:16px; background:linear-gradient(135deg,var(--brand),var(--indigo)); display:flex; align-items:center; justify-content:center; font-size:26px; margin-bottom:18px; box-shadow:0 10px 24px -8px rgba(14,159,110,.5);}
.login-card h1{font-size:22px; margin:0 0 4px;}
.login-card p.sub{color:var(--text-dim); font-size:13.5px; margin:0 0 26px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; font-weight:700;}
.field input, .field select{width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg); color:var(--text); font-size:14.5px; outline:none; transition:border .15s;}
.field input:focus, .field select:focus{border-color:var(--brand);}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:12px; padding:12px 18px; font-size:14.5px; font-weight:700; transition:transform .12s, box-shadow .12s, opacity .12s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--brand); color:#fff; box-shadow:0 8px 20px -6px rgba(14,159,110,.55);}
.btn-primary:hover{background:var(--brand-dark);}
.btn-block{width:100%;}
.btn-ghost{background:var(--surface-2); color:var(--text);}
.btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--text);}
.btn-danger{background:var(--red-soft); color:var(--red);}
.btn-sm{padding:8px 12px; font-size:13px; border-radius:9px;}
.login-err{background:var(--red-soft); color:var(--red); padding:10px 12px; border-radius:10px; font-size:13px; margin-bottom:14px; display:none;}
.login-foot{margin-top:20px; text-align:center; font-size:12px; color:var(--text-faint);}
.role-chips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
.role-chip{padding:6px 12px; border-radius:20px; font-size:12px; border:1.5px solid var(--border); color:var(--text-dim); cursor:pointer;}
.role-chip.active{background:var(--brand-soft); color:var(--brand); border-color:var(--brand);}

/* ---------- App shell ---------- */
#app{display:none;}
#app.show{display:flex; min-height:100vh;}
.sidebar{width:252px; flex-shrink:0; background:var(--bg-alt); border-left:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; bottom:0; right:0; z-index:120; transition:transform .25s;}
.sidebar-head{display:flex; align-items:center; gap:10px; padding:20px 18px 14px;}
.sidebar-head .mark{width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--brand),var(--indigo)); display:flex; align-items:center; justify-content:center; font-size:18px;}
.sidebar-head b{font-size:16px;}
.sidebar-head small{display:block; color:var(--text-faint); font-size:11px;}
.nav-scroll{flex:1; overflow-y:auto; padding:6px 12px;}
.nav-group{margin:14px 8px 6px; font-size:11px; color:var(--text-faint); font-weight:700; letter-spacing:.5px;}
.nav-item{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:11px; color:var(--text-dim); font-size:14px; font-weight:600; margin-bottom:2px; position:relative;}
.nav-item .ic{width:18px; text-align:center; font-size:15px;}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.active{background:var(--brand-soft); color:var(--brand);}
.nav-item .badge{margin-right:auto; background:var(--red); color:#fff; font-size:10px; padding:1px 6px; border-radius:20px;}
.sidebar-foot{padding:14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px;}
.avatar{width:36px; height:36px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--brand); font-size:14px; flex-shrink:0;}
.sidebar-foot .who{flex:1; min-width:0;}
.sidebar-foot .who b{display:block; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.sidebar-foot .who small{color:var(--text-faint); font-size:11px;}
.icon-btn{width:34px; height:34px; border-radius:9px; background:var(--surface-2); border:none; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:15px; flex-shrink:0;}
.icon-btn:hover{color:var(--text);}

.main{flex:1; margin-right:252px; min-width:0;}
.topbar{position:sticky; top:0; z-index:80; display:flex; align-items:center; gap:14px; padding:14px 26px; background:color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
.topbar h2{font-size:19px; margin:0;}
.topbar .crumb{color:var(--text-faint); font-size:12.5px; margin-top:2px;}
.topbar-actions{margin-right:auto; display:flex; align-items:center; gap:8px;}
#menuToggle{display:none;}
.search-box{display:flex; align-items:center; gap:8px; background:var(--surface-2); border-radius:11px; padding:9px 14px; width:230px; border:1.5px solid transparent;}
.search-box input{background:transparent; border:none; outline:none; color:var(--text); font-size:13.5px; width:100%;}
.page{padding:22px 26px 60px;}
.page-section{display:none;}
.page-section.active{display:block; animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

/* ---------- Cards / grid ---------- */
.grid{display:grid; gap:16px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:760px){.g4,.g3,.g2{grid-template-columns:1fr 1fr;}}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow);}
.stat-card{position:relative; overflow:hidden;}
.stat-card .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.stat-card .ic{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px;}
.stat-card .val{font-family:var(--font-head); font-size:26px; font-weight:800;}
.stat-card .lbl{color:var(--text-dim); font-size:12.5px; margin-top:2px;}
.stat-card .delta{font-size:11.5px; margin-top:8px; display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px;}
.delta.up{background:var(--brand-soft); color:var(--brand);}
.delta.down{background:var(--red-soft); color:var(--red);}

.section-title{display:flex; align-items:center; justify-content:space-between; margin:26px 0 12px;}
.section-title h3{font-size:16px; margin:0;}
.section-title .link{font-size:12.5px; color:var(--brand); font-weight:700;}

/* rooms live board */
.room-board{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
.room-tile{border-radius:14px; padding:14px; border:1px solid var(--border); background:var(--surface);}
.room-tile .dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-left:6px;}
.dot.g{background:#1FCB7A; box-shadow:0 0 0 4px rgba(31,203,122,.18);}
.dot.y{background:#F0B94F; box-shadow:0 0 0 4px rgba(240,185,79,.18);}
.dot.r{background:#F0605F; box-shadow:0 0 0 4px rgba(240,96,95,.18); animation:blinkDot 1.6s infinite;}
@keyframes blinkDot{50%{opacity:.4;}}
.room-tile .rname{font-weight:800; font-size:14px; margin-top:6px;}
.room-tile .rmeta{font-size:11.5px; color:var(--text-faint); margin-top:3px;}

/* table */
.table-wrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
.table-toolbar{display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
thead th{text-align:right; padding:12px 16px; color:var(--text-faint); font-size:11.5px; font-weight:700; border-bottom:1px solid var(--border); white-space:nowrap;}
tbody td{padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-2);}
.pill{display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
.pill.green{background:var(--brand-soft); color:var(--brand);}
.pill.red{background:var(--red-soft); color:var(--red);}
.pill.amber{background:var(--amber-soft); color:var(--amber);}
.pill.blue{background:var(--blue-soft); color:var(--blue);}
.pill.gray{background:var(--surface-2); color:var(--text-dim);}
.row-actions{display:flex; gap:6px;}
.empty-state{padding:50px 20px; text-align:center; color:var(--text-faint);}
.empty-state .ic{font-size:34px; margin-bottom:10px;}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(10,12,25,.55); display:none; align-items:center; justify-content:center; z-index:400; padding:20px; backdrop-filter:blur(2px);}
.modal-bg.show{display:flex;}
.modal{width:100%; max-width:520px; background:var(--surface); border-radius:20px; border:1px solid var(--border); box-shadow:var(--shadow-lg); max-height:88vh; display:flex; flex-direction:column;}
.modal.wide{max-width:760px;}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--border);}
.modal-head h3{margin:0; font-size:16px;}
.modal-body{padding:20px; overflow-y:auto;}
.modal-foot{padding:16px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.form-grid .full{grid-column:1/-1;}
@media(max-width:560px){.form-grid{grid-template-columns:1fr;}}

/* toast */
#toastWrap{position:fixed; bottom:20px; left:20px; z-index:600; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-lg); border-radius:12px; padding:12px 16px; font-size:13.5px; display:flex; align-items:center; gap:10px; animation:toastIn .25s; min-width:220px;}
@keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
.toast.ok{border-right:4px solid var(--brand);}
.toast.err{border-right:4px solid var(--red);}
.toast.info{border-right:4px solid var(--blue);}

/* misc */
.chip-row{display:flex; gap:8px; flex-wrap:wrap;}
.tab-row{display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:16px; overflow-x:auto;}
.tab-btn{padding:10px 16px; font-size:13.5px; font-weight:700; color:var(--text-faint); background:none; border:none; border-bottom:2px solid transparent; white-space:nowrap;}
.tab-btn.active{color:var(--brand); border-color:var(--brand);}
.mini-chart-wrap{height:220px;}
.qr-box{width:150px; height:150px; margin:0 auto; background:#fff; border-radius:12px; padding:10px; display:flex; align-items:center; justify-content:center;}
.kv{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--border); font-size:13.5px;}
.kv:last-child{border-bottom:none;}
.kv b{color:var(--text-faint); font-weight:600;}
.notif-item{display:flex; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border);}
.notif-item .ic{width:34px; height:34px; border-radius:9px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.notif-item.unread{background:var(--brand-soft);}
.progress{height:7px; border-radius:20px; background:var(--surface-2); overflow:hidden;}
.progress i{display:block; height:100%; background:var(--brand); border-radius:20px;}

/* mobile */
.mobile-overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:110; display:none;}
@media(max-width:980px){
  .sidebar{transform:translateX(100%);}
  .sidebar.open{transform:none;}
  .main{margin-right:0;}
  #menuToggle{display:flex;}
  .search-box{display:none;}
  .form-grid{grid-template-columns:1fr;}
  .g3{grid-template-columns:1fr 1fr;}
}
@media(max-width:520px){
  .g4,.g3,.g2{grid-template-columns:1fr 1fr;}
  .page{padding:16px 14px 50px;}
  .topbar{padding:12px 14px;}
}
.hide{display:none !important;}
.text-dim{color:var(--text-dim);}
.text-brand{color:var(--brand);}
.mt0{margin-top:0;}
.flex{display:flex; align-items:center;}
.gap8{gap:8px;}
.gap12{gap:12px;}
.spacer{flex:1;}
</style>
</head>
<body>

<div id="bootLoader"><div class="pulse-dot"></div><span id="bootLoaderMsg">جاري تحميل النظام…</span><span id="bootLoaderErr" style="color:var(--red); font-size:12.5px; max-width:340px; text-align:center; display:none;"></span></div>

<div id="toastWrap"></div>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🎓</div>
    <h1>تسجيل الدخول</h1>
    <p class="sub">نظام إدارة السنتر التعليمي — ادخل بياناتك للمتابعة</p>
    <div class="login-err" id="loginErr"></div>
    <div class="field">
      <label>كود الدخول أو رقم الهاتف</label>
      <input type="text" id="loginUser" placeholder="مثال: admin أو 01000000000" autocomplete="username">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-block" onclick="Auth.login()">دخول</button>
    <div class="login-foot">أول مرة تدخل بالنظام؟ استخدم <b>admin / admin123</b> لإنشاء حساب المالك</div>
  </div>
</div>

<!-- ================= APP ================= -->
<div class="mobile-overlay" id="mobileOverlay" onclick="UI.closeSidebar()"></div>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="mark">🎓</div>
      <div><b class="brand-font" id="centerNameLbl">نبض</b><small>نظام إدارة السنتر</small></div>
    </div>
    <div class="nav-scroll" id="navScroll"></div>
    <div class="sidebar-foot">
      <div class="avatar" id="userAvatar">?</div>
      <div class="who"><b id="userNameLbl">—</b><small id="userRoleLbl">—</small></div>
      <button class="icon-btn" title="تسجيل الخروج" onclick="Auth.logout()">⏻</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="icon-btn" id="menuToggle" onclick="UI.openSidebar()">☰</button>
      <div>
        <h2 id="pageTitle">لوحة التحكم</h2>
        <div class="crumb" id="pageCrumb">نظرة عامة</div>
      </div>
      <div class="topbar-actions">
        <div class="search-box"><span>🔍</span><input placeholder="بحث سريع… (اسم / كود / هاتف)" id="globalSearch" oninput="UI.globalSearch(this.value)"></div>
        <button class="icon-btn" onclick="UI.toggleTheme()" title="الوضع الليلي">🌙</button>
        <button class="icon-btn" onclick="Pages.open('notifications')" title="الإشعارات" style="position:relative;" id="notifBtn">🔔<span id="notifDot" style="display:none;position:absolute;top:6px;left:6px;width:8px;height:8px;background:var(--red);border-radius:50%;"></span></button>
      </div>
    </div>
    <div class="page" id="pageRoot"></div>
  </main>
</div>

<script>
/* ============================================================
   نبض ERP — نظام إدارة السناتر التعليمية
   ملف واحد: HTML + CSS + JS — Firebase Realtime Database
   ============================================================ */

/* ---------- 1) إعداد Firebase ----------
   استبدل القيم دي ببيانات مشروعك على Firebase Console
   (Realtime Database, ليس Firestore) */
const firebaseConfig = {
  apiKey: "AIzaSyBBHUWqxFsaIn442PSuieSlbhrpB7awwAw",
  authDomain: "exam-result-system-ca200.firebaseapp.com",
  databaseURL: "https://exam-result-system-ca200-default-rtdb.firebaseio.com",
  projectId: "exam-result-system-ca200",
  storageBucket: "exam-result-system-ca200.firebasestorage.app",
  messagingSenderId: "149705342999",
  appId: "1:149705342999:web:f62b7172af711a94531c52"
};
let rtdb;
try{
  firebase.initializeApp(firebaseConfig);
  rtdb = firebase.database();
}catch(e){
  console.error('Firebase init error', e);
  window.addEventListener('DOMContentLoaded', ()=>{
    const errBox = document.getElementById('bootLoaderErr');
    if(errBox){ errBox.style.display='block'; errBox.textContent = 'فشل تهيئة Firebase: ' + e.message; }
  });
}

/* ---------- 2) أدوات عامة ---------- */
const Utils = {
  uid(){ return 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); },
  code(len=6){ let s=''; for(let i=0;i<len;i++) s+=Math.floor(Math.random()*10); return s; },
  money(n){ n = Number(n)||0; return n.toLocaleString('ar-EG',{maximumFractionDigits:0}) + ' ج.م'; },
  num(n){ return (Number(n)||0).toLocaleString('ar-EG'); },
  todayISO(){ return new Date().toISOString().slice(0,10); },
  nowTime(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); },
  fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short',year:'numeric'}); },
  fmtDateTime(ts){ if(!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'}) + ' - ' + d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); },
  weekDay(iso){ const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت']; return days[new Date(iso).getDay()]; },
  esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
  minutesBetween(t1,t2){ const [h1,m1]=t1.split(':').map(Number), [h2,m2]=t2.split(':').map(Number); return (h2*60+m2)-(h1*60+m1); },
  timeNowMinutes(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); },
  toMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; },
  debounce(fn,ms=250){ let t; return (...a)=>{clearTimeout(t); t=setTimeout(()=>fn(...a),ms);}; },
  initials(name){ if(!name) return '؟'; const p=name.trim().split(' '); return (p[0]?.[0]||'')+(p[1]?.[0]||''); }
};

/* ---------- 3) طبقة الوصول لقاعدة البيانات ---------- */
const DB = {
  cache:{ settings:{}, students:{}, teachers:{}, employees:{}, parents:{}, subjects:{},
          classrooms:{}, groups:{}, sessions:{}, attendance:{}, payments:{}, teacherPayments:{},
          expenses:{}, notifications:{}, users:{}, auditLogs:{}, exams:{}, examResults:{} },
  listeners:[],

  initListeners(cb){
    const keys = Object.keys(this.cache);
    let loaded = 0;
    const errBox = document.getElementById('bootLoaderErr');
    keys.forEach(key=>{
      const ref = rtdb.ref(key);
      const handler = ref.on('value', snap=>{
        this.cache[key] = snap.val() || {};
        loaded++;
        if(loaded===keys.length && cb) { cb(); cb=null; }
        UI.onDataChange(key);
      }, err=>{
        console.error('DB read error @'+key, err);
        if(errBox){ errBox.style.display='block'; errBox.textContent = 'خطأ في الاتصال بقاعدة البيانات (' + key + '): ' + (err && err.message ? err.message : err); }
        if(loaded<keys.length){loaded++; if(loaded===keys.length && cb){cb(); cb=null;}}
      });
      this.listeners.push({ref,handler});
    });
    setTimeout(()=>{
      if(loaded<keys.length && errBox && errBox.style.display==='none'){
        errBox.style.display='block';
        errBox.textContent = 'النظام مستني رد من Firebase من 8 ثواني ولسه محصلش. تأكد إن الـ Realtime Database متفعّلة في مشروعك وإن الـ databaseURL صح، وإن الـ Rules بتسمح بالقراءة.';
      }
    }, 8000);
  },

  add(collection, data){
    const ref = rtdb.ref(collection).push();
    data = {...data, id: ref.key, createdAt: Date.now()};
    return ref.set(data).then(()=>ref.key);
  },
  set(collection, id, data){
    return rtdb.ref(collection+'/'+id).set({...data, id, createdAt:data.createdAt||Date.now()});
  },
  update(collection, id, patch){
    return rtdb.ref(collection+'/'+id).update({...patch, updatedAt: Date.now()});
  },
  remove(collection, id){
    return rtdb.ref(collection+'/'+id).remove();
  },
  list(collection){
    return Object.values(this.cache[collection]||{});
  },
  get(collection, id){
    return (this.cache[collection]||{})[id];
  },
  log(action, target){
    if(!Auth.user) return;
    this.add('auditLogs', {action, target, userId:Auth.user.id, userName:Auth.user.name, ts:Date.now()});
  },
  notify({title, body, role=null, userId=null, type='info'}){
    this.add('notifications', {title, body, role, userId, type, read:false});
  }
};

/* ---------- 4) المصادقة ---------- */
const Auth = {
  user:null,
  SESSION_KEY:'nabd_session_v1',

  async login(){
    const uEl=document.getElementById('loginUser'), pEl=document.getElementById('loginPass'), errEl=document.getElementById('loginErr');
    const uname=(uEl.value||'').trim(), pass=(pEl.value||'').trim();
    errEl.style.display='none';
    if(!uname||!pass){ this.showErr('من فضلك ادخل بيانات الدخول كاملة'); return; }

    const users = DB.list('users');
    let found = users.find(u => (u.username===uname || u.phone===uname) && u.password===pass);

    // أول تشغيل: مفيش أي مستخدم مسجل + دخل admin/admin123 => ننشئ حساب مالك
    if(!found && users.length===0 && uname==='admin' && pass==='admin123'){
      const id = await DB.add('users', {username:'admin', password:'admin123', role:'owner', name:'صاحب السنتر', active:true});
      found = {id, username:'admin', role:'owner', name:'صاحب السنتر'};
    }

    if(!found){ this.showErr('بيانات الدخول غير صحيحة'); return; }
    if(found.active===false){ this.showErr('هذا الحساب موقوف، راجع الإدارة'); return; }

    this.setSession(found);
    Boot.enterApp();
  },
  showErr(msg){
    const errEl=document.getElementById('loginErr');
    errEl.textContent=msg; errEl.style.display='block';
  },
  setSession(user){
    this.user = user;
    localStorage.setItem(this.SESSION_KEY, JSON.stringify({id:user.id, ts:Date.now()}));
  },
  restoreSession(){
    try{
      const raw = localStorage.getItem(this.SESSION_KEY);
      if(!raw) return false;
      const {id} = JSON.parse(raw);
      const u = DB.get('users', id);
      if(!u || u.active===false) return false;
      this.user = u;
      return true;
    }catch(e){ return false; }
  },
  logout(){
    localStorage.removeItem(this.SESSION_KEY);
    location.reload();
  },
  can(perm){
    if(!this.user) return false;
    const role = this.user.role;
    if(role==='owner') return true;
    const map = {
      admin:['view_all','manage_students','manage_teachers','manage_employees','manage_classrooms','manage_groups','manage_attendance','manage_payments','manage_expenses','manage_exams','manage_notifications','view_reports'],
      reception:['manage_students','manage_attendance','manage_payments','manage_classrooms_view','view_reports'],
      teacher:['manage_own_groups','manage_own_attendance','view_own_dues'],
      employee:['manage_students','manage_attendance'],
      student:['view_self'],
      parent:['view_child']
    };
    return (map[role]||[]).includes(perm);
  }
};

  modal(html, {wide=false, onClose=null}={}){
    let bg = document.getElementById('dynModalBg');
    if(!bg){
      bg = document.createElement('div');
      bg.id='dynModalBg'; bg.className='modal-bg';
      document.body.appendChild(bg);
      bg.addEventListener('click', e=>{ if(e.target===bg) UI.closeModal(); });

    bg.innerHTML = `<div class="modal ${wide?'wide':''}">${html}</div>`;
    bg.classList.add('show');
    this._onModalClose = onClose;
  },
  closeModal(){
    const bg = document.getElementById('dynModalBg');
    if(bg) bg.classList.remove('show');
    if(this._onModalClose) { this._onModalClose(); this._onModalClose=null; }
  },

  confirm(msg, onYes){
    this.modal(`
      <div class="modal-body" style="text-align:center; padding-top:30px;">
        <div style="font-size:38px; margin-bottom:10px;">⚠️</div>

        </div>
      </div>`);
    document.getElementById('confirmYesBtn').onclick = ()=>{ UI.closeModal(); onYes(); };
  },

  _dataChangeTimer:null,
  onDataChange(key){
    clearTimeout(this._dataChangeTimer);
    this._dataChangeTimer = setTimeout(()=>{
      Sidebar.updateBadges();
      if(Pages.current) Pages.render(Pages.current, true);
    }, 150);
  },

  globalSearch: Utils.debounce(function(q){
    if(!q || q.trim().length<1){ return; }
    q = q.trim().toLowerCase();
    const students = DB.list('students').filter(s=> (s.name||'').toLowerCase().includes(q) || (s.code||'').includes(q) || (s.phone||'').includes(q));
    const teachers = DB.list('teachers').filter(t=> (t.name||'').toLowerCase().includes(q) || (t.phone||'').includes(q));
    UI.modal(`
      <div class="modal-head"><h3>نتائج البحث عن "${Utils.esc(q)}"</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="text-dim" style="font-size:12.5px; margin-bottom:8px;">طلاب (${students.length})</div>
        ${students.slice(0,6).map(s=>`<div class="notif-item" style="cursor:pointer" onclick="UI.closeModal(); Pages.open('students'); setTimeout(()=>Students.openProfile('${s.id}'),200)"><div class="ic">🎓</div><div><b>${Utils.esc(s.name)}</b><div class="text-dim" style="font-size:12px;">كود ${Utils.esc(s.code)} — ${Utils.esc(s.phone||'')}</div></div></div>`).join('') || '<div class="text-dim" style="font-size:13px; padding:8px 0;">لا يوجد</div>'}
        <div class="text-dim" style="font-size:12.5px; margin:14px 0 8px;">مدرسين (${teachers.length})</div>

      </div>`, {wide:false});
  }, 400)
};

<script>
/* ============================================================
   9) لوحة التحكم Dashboard
   ============================================================ */
const PageRenderers = {};

function centerSettings(){ return {centerCutPerStudent:15, centerName:'نبض', ...(DB.cache.settings||{})}; }

function roomLiveStatus(room){
  // نرجع حالة القاعة الآن بناءً على الحصص المجدولة اليوم
  const today = Utils.todayISO();
  const nowMin = Utils.timeNowMinutes();
  const sessionsToday = DB.list('sessions').filter(s=> s.classroomId===room.id && s.date===today && s.status!=='cancelled');
  for(const s of sessionsToday){
    const start = Utils.toMinutes(s.startTime), end = Utils.toMinutes(s.endTime);
    if(nowMin>=start && nowMin<=end) return {status:'busy', session:s};
    if(start-nowMin>0 && start-nowMin<=20) return {status:'soon', session:s};
  }
  return {status:'free', session:null};
}

PageRenderers.dashboard = function(){
  const students = DB.list('students');
  const teachers = DB.list('teachers');
  const classrooms = DB.list('classrooms');
  const groups = DB.list('groups');
  const today = Utils.todayISO();
  const sessionsToday = DB.list('sessions').filter(s=>s.date===today);
  const attendanceToday = DB.list('attendance').filter(a=>a.date===today);
  const presentToday = attendanceToday.filter(a=>a.status==='present').length;
  const absentToday = attendanceToday.filter(a=>a.status==='absent').length;
  const cut = Number(centerSettings().centerCutPerStudent)||15;

  const paymentsToday = DB.list('payments').filter(p=> (p.date||'').slice(0,10)===today);
  const revenueToday = paymentsToday.reduce((s,p)=>s+Number(p.amount||0),0);
  const thisMonth = today.slice(0,7);
  const paymentsMonth = DB.list('payments').filter(p=> (p.date||'').startsWith(thisMonth));
  const revenueMonth = paymentsMonth.reduce((s,p)=>s+Number(p.amount||0),0);

  // أرباح السنتر = عدد مرات الحضور المسجلة الشهر ده * نصيب السنتر الثابت
  const attendanceMonth = DB.list('attendance').filter(a=> (a.date||'').startsWith(thisMonth) && a.status==='present');
  const centerProfitMonth = attendanceMonth.length * cut;
  const teacherDuesTotal = teachers.reduce((sum,t)=> sum + TeacherDues.calcDue(t.id).due, 0);

  const busyRooms = classrooms.filter(r=> roomLiveStatus(r).status==='busy').length;
  const freeRooms = classrooms.length - busyRooms;

  // أفضل مدرس (بعدد الطلاب)
  const teacherStudentCount = {};
  groups.forEach(g=>{ teacherStudentCount[g.teacherId] = (teacherStudentCount[g.teacherId]||0) + (g.studentIds? Object.keys(g.studentIds).length:0); });
  const topTeacherId = Object.entries(teacherStudentCount).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const topTeacher = topTeacherId ? DB.get('teachers', topTeacherId) : null;

  // أكثر الطلاب غيابًا (آخر 30 يوم)
  const since = Date.now() - 30*24*3600*1000;
  const absCount = {};
  DB.list('attendance').filter(a=> a.status==='absent' && a.createdAt>since).forEach(a=>{ absCount[a.studentId]=(absCount[a.studentId]||0)+1; });
  const topAbsent = Object.entries(absCount).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([sid,c])=>({student:DB.get('students',sid), c}));

  return `
  <div class="grid g4">
    ${statCard('🎓','var(--brand)','var(--brand-soft)', students.length, 'إجمالي الطلاب')}
    ${statCard('✅','var(--blue)','var(--blue-soft)', presentToday, 'حاضر اليوم')}
    ${statCard('🚫','var(--red)','var(--red-soft)', absentToday, 'غائب اليوم')}
    ${statCard('🏫','var(--amber)','var(--amber-soft)', `${busyRooms}/${classrooms.length}`, 'قاعات مشغولة الآن')}
  </div>

  <div class="grid g4" style="margin-top:16px;">
    ${statCard('💵','var(--brand)','var(--brand-soft)', Utils.money(revenueToday), 'إيراد اليوم')}
    ${statCard('📅','var(--indigo)','var(--blue-soft)', Utils.money(revenueMonth), 'إيراد الشهر')}
    ${statCard('🏆','var(--brand)','var(--brand-soft)', Utils.money(centerProfitMonth), 'ربح السنتر (الشهر)')}
    ${statCard('💰','var(--amber)','var(--amber-soft)', Utils.money(teacherDuesTotal), 'مستحقات المدرسين')}
  </div>

  <div class="section-title"><h3>🟢 حالة القاعات الآن</h3><span class="link" onclick="Pages.open('classrooms')">عرض الكل ←</span></div>
  <div class="room-board">
    ${classrooms.length? classrooms.map(r=>{
      const st = roomLiveStatus(r);
      const dot = st.status==='busy'?'r':st.status==='soon'?'y':'g';
      const label = st.status==='busy'?'مشغولة الآن':st.status==='soon'?'ستبدأ قريبًا':'متاحة';
      const g = st.session ? DB.get('groups', st.session.groupId) : null;
      return `<div class="room-tile">
        <span class="dot ${dot}"></span><span style="font-size:11.5px; color:var(--text-dim);">${label}</span>
        <div class="rname">${Utils.esc(r.name)}</div>
        <div class="rmeta">${g? Utils.esc(g.name||'') : 'سعة '+r.capacity}</div>
      </div>`;
    }).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="ic">🏫</div>لسه مفيش قاعات مضافة</div>`}
  </div>

  <div class="grid g2" style="margin-top:22px; align-items:start;">
    <div class="card">
      <div class="section-title mt0"><h3>📈 الإيراد آخر 7 أيام</h3></div>
      <div class="mini-chart-wrap"><canvas id="revenueChart"></canvas></div>
    </div>
    <div class="card">
      <div class="section-title mt0"><h3>👥 الحضور والغياب اليوم</h3></div>
      <div class="mini-chart-wrap"><canvas id="attChart"></canvas></div>
    </div>
  </div>

  <div class="grid g2" style="margin-top:22px; align-items:start;">
    <div class="card">
      <div class="section-title mt0"><h3>🏆 أفضل مدرس</h3></div>
      ${topTeacher? `
        <div class="flex gap12"><div class="avatar" style="width:46px;height:46px;font-size:16px;">${Utils.initials(topTeacher.name)}</div>
        <div><b>${Utils.esc(topTeacher.name)}</b><div class="text-dim" style="font-size:12.5px;">${teacherStudentCount[topTeacherId]} طالب مسجل</div></div></div>
      ` : `<div class="empty-state"><div class="ic">👨‍🏫</div>لا توجد بيانات كافية</div>`}
    </div>
    <div class="card">
      <div class="section-title mt0"><h3>⚠️ أكثر الطلاب غيابًا (٣٠ يوم)</h3></div>
      ${topAbsent.length? topAbsent.map(x=>`
        <div class="kv"><b>${x.student? Utils.esc(x.student.name):'—'}</b><span class="pill red">${x.c} غياب</span></div>
      `).join('') : `<div class="empty-state"><div class="ic">🎉</div>مفيش غياب مقلق</div>`}
    </div>
  </div>
  `;
};

function statCard(icon,color,bg,val,lbl){
  return `<div class="card stat-card">
    <div class="top"><div class="ic" style="background:${bg}; color:${color};">${icon}</div></div>
    <div class="val">${val}</div>
    <div class="lbl">${lbl}</div>
  </div>`;
}

PageAfterRender.dashboard = function(){
  const days=[]; const labels=[];
  const dayNames=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  for(let i=6;i>=0;i--){
    const d = new Date(Date.now()-i*86400000);
    const iso = d.toISOString().slice(0,10);
    days.push(iso); labels.push(dayNames[d.getDay()]);
  }
  const revData = days.map(iso => DB.list('payments').filter(p=>(p.date||'').slice(0,10)===iso).reduce((s,p)=>s+Number(p.amount||0),0));
  const revCanvas = document.getElementById('revenueChart');
  if(revCanvas){
    new Chart(revCanvas, {type:'line', data:{labels, datasets:[{data:revData, borderColor:'#0E9F6E', backgroundColor:'rgba(14,159,110,.12)', fill:true, tension:.4, pointRadius:3}]},
      options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{color:'rgba(120,130,160,.1)'}}, x:{grid:{display:false}}}}});
  }
  const today = Utils.todayISO();
  const att = DB.list('attendance').filter(a=>a.date===today);
  const present = att.filter(a=>a.status==='present').length;
  const absent = att.filter(a=>a.status==='absent').length;
  const attCanvas = document.getElementById('attChart');
  if(attCanvas){
    new Chart(attCanvas, {type:'doughnut', data:{labels:['حاضر','غائب'], datasets:[{data:[present||0,absent||0], backgroundColor:['#0E9F6E','#E24C4B'], borderWidth:0}]},
      options:{plugins:{legend:{position:'bottom', labels:{boxWidth:10, font:{family:'Tajawal'}}}}, cutout:'68%'}});
  }
};
</script>
<script>
/* ============================================================

const Students = { filterText:'', filterStage:'' };

PageRenderers.students = function(){
  const all = DB.list('students').sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const stages = [...new Set(all.map(s=>s.stage).filter(Boolean))];
  let rows = all;
  if(Students.filterText){
    const q = Students.filterText.toLowerCase();
    rows = rows.filter(s=> (s.name||'').toLowerCase().includes(q) || (s.code||'').includes(q) || (s.phone||'').includes(q));
  }
  if(Students.filterStage) rows = rows.filter(s=>s.stage===Students.filterStage);

  return `
  <div class="table-wrap">
    <div class="table-toolbar">
      <input class="field-inline" placeholder="🔍 بحث بالاسم / الكود / الهاتف" style="flex:1; min-width:180px; padding:10px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); color:var(--text);" value="${Utils.esc(Students.filterText)}" oninput="Students.filterText=this.value; Pages.render('students');">
      <select style="padding:10px 12px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); color:var(--text);" onchange="Students.filterStage=this.value; Pages.render('students');">
        <option value="">كل المراحل</option>
        ${stages.map(s=>`<option value="${Utils.esc(s)}" ${Students.filterStage===s?'selected':''}>${Utils.esc(s)}</option>`).join('')}
      </select>
      <div class="spacer"></div>
      <button class="btn btn-primary btn-sm" onclick="Students.openForm()">+ طالب جديد</button>
    </div>
    ${rows.length? `
    <div style="overflow-x:auto;">
    <table>
      <thead><tr><th>الطالب</th><th>الكود</th><th>المرحلة</th><th>ولي الأمر</th><th>نسبة الحضور</th><th>الحالة المالية</th><th></th></tr></thead>
      <tbody>
        ${rows.map(s=>{
          const att = DB.list('attendance').filter(a=>a.studentId===s.id);
          const present = att.filter(a=>a.status==='present').length;
          const pct = att.length? Math.round(present/att.length*100) : 0;
          const debt = Number(s.debt)||0;
          return `<tr style="cursor:pointer" onclick="Students.openProfile('${s.id}')">
            <td><div class="flex gap8"><div class="avatar" style="width:32px;height:32px;font-size:12px;">${Utils.initials(s.name)}</div><b>${Utils.esc(s.name)}</b></div></td>
            <td><span class="pill gray">${Utils.esc(s.code)}</span></td>
            <td>${Utils.esc(s.stage||'—')}</td>
            <td>${Utils.esc(s.parentPhone||s.phone||'—')}</td>
            <td style="min-width:100px;"><div class="progress"><i style="width:${pct}%; background:${pct>=80?'var(--brand)':pct>=50?'var(--amber)':'var(--red)'}"></i></div><small class="text-dim">${pct}%</small></td>
            <td>${debt>0? `<span class="pill red">مديون ${Utils.money(debt)}</span>` : `<span class="pill green">مسدد</span>`}</td>
            <td onclick="event.stopPropagation()"><div class="row-actions">
              <button class="icon-btn" title="تعديل" onclick="Students.openForm('${s.id}')">✏️</button>
              <button class="icon-btn" title="حذف" onclick="Students.remove('${s.id}')">🗑️</button>
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>` : `<div class="empty-state"><div class="ic">🎓</div>مفيش طلاب مطابقين، جرب تضيف طالب جديد</div>`}
  </div>`;
};

Students.openForm = function(id){
  const s = id ? DB.get('students', id) : {};
  const subjects = DB.list('subjects');
  UI.modal(`
    <div class="modal-head"><h3>${id?'تعديل بيانات طالب':'إضافة طالب جديد'}</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full"><label>اسم الطالب</label><input id="f_name" value="${Utils.esc(s.name||'')}" placeholder="الاسم بالكامل"></div>
        <div class="field"><label>هاتف الطالب</label><input id="f_phone" value="${Utils.esc(s.phone||'')}"></div>
        <div class="field"><label>هاتف ولي الأمر</label><input id="f_parentPhone" value="${Utils.esc(s.parentPhone||'')}"></div>
        <div class="field"><label>المرحلة الدراسية</label><input id="f_stage" value="${Utils.esc(s.stage||'')}" placeholder="مثال: الصف الثالث الثانوي"></div>
        <div class="field"><label>المدرسة</label><input id="f_school" value="${Utils.esc(s.school||'')}"></div>
        <div class="field full"><label>ملاحظات</label><input id="f_notes" value="${Utils.esc(s.notes||'')}"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="UI.closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="Students.save('${id||''}')">${id?'حفظ التعديلات':'إضافة الطالب'}</button>
    </div>`);
};

Students.save = async function(id){
  const data = {
    name: document.getElementById('f_name').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    parentPhone: document.getElementById('f_parentPhone').value.trim(),
    stage: document.getElementById('f_stage').value.trim(),
    school: document.getElementById('f_school').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
  };
  if(!data.name){ UI.toast('من فضلك ادخل اسم الطالب', 'err'); return; }
  try{
    if(id){
      await DB.update('students', id, data);
      DB.log('تعديل بيانات طالب', data.name);
      UI.toast('تم حفظ التعديلات');
    }else{
      data.code = Utils.code(6);
      data.debt = 0;
      const newId = await DB.add('students', data);
      DB.log('إضافة طالب جديد', data.name);
      UI.notify({title:'طالب جديد', body:`تم تسجيل ${data.name} في السنتر`, role:'owner', type:'ok'});
      UI.toast('تمت إضافة الطالب بنجاح');
    }
    UI.closeModal();
  }catch(e){ UI.toast('حصل خطأ، حاول تاني', 'err'); console.error(e); }
};

Students.remove = function(id){
  const s = DB.get('students', id);
  UI.confirm(`هتحذف الطالب "${s?.name}" نهائيًا، متأكد؟`, async ()=>{
    await DB.remove('students', id);
    DB.log('حذف طالب', s?.name);
    UI.toast('تم حذف الطالب');
  });
};

Students.openProfile = function(id){
  const s = DB.get('students', id);
  if(!s) return;
  const att = DB.list('attendance').filter(a=>a.studentId===id).sort((a,b)=>b.createdAt-a.createdAt);
  const present = att.filter(a=>a.status==='present').length;
  const pct = att.length? Math.round(present/att.length*100):0;
  const pays = DB.list('payments').filter(p=>p.studentId===id).sort((a,b)=>b.createdAt-a.createdAt);
  const myGroups = DB.list('groups').filter(g=> g.studentIds && g.studentIds[id]);

  UI.modal(`
    <div class="modal-head"><h3>ملف الطالب</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="flex gap12" style="margin-bottom:16px;">
        <div class="avatar" style="width:54px;height:54px;font-size:18px;">${Utils.initials(s.name)}</div>
        <div><h3 style="margin:0 0 2px;">${Utils.esc(s.name)}</h3><div class="text-dim" style="font-size:13px;">كود: ${Utils.esc(s.code)} · ${Utils.esc(s.stage||'')}</div></div>
      </div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="Students._tab(this,'t1')">البيانات</button>
        <button class="tab-btn" onclick="Students._tab(this,'t2')">QR الطالب</button>
        <button class="tab-btn" onclick="Students._tab(this,'t3')">الحضور</button>
        <button class="tab-btn" onclick="Students._tab(this,'t4')">المدفوعات</button>
      </div>
      <div id="t1">
        <div class="kv"><b>هاتف الطالب</b><span>${Utils.esc(s.phone||'—')}</span></div>
        <div class="kv"><b>هاتف ولي الأمر</b><span>${Utils.esc(s.parentPhone||'—')} ${s.parentPhone?`<a href="https://wa.me/2${Utils.esc(s.parentPhone)}" target="_blank" style="color:var(--brand)">واتساب↗</a>`:''}</span></div>
        <div class="kv"><b>المدرسة</b><span>${Utils.esc(s.school||'—')}</span></div>
        <div class="kv"><b>المجموعات</b><span>${myGroups.map(g=>Utils.esc(g.name)).join('، ')||'—'}</span></div>
        <div class="kv"><b>نسبة الحضور</b><span>${pct}%</span></div>
        <div class="kv"><b>الحالة المالية</b><span>${Number(s.debt)>0?`<span class="pill red">مديون ${Utils.money(s.debt)}</span>`:'<span class="pill green">مسدد</span>'}</span></div>
        <div class="kv"><b>ملاحظات</b><span>${Utils.esc(s.notes||'—')}</span></div>
      </div>
      <div id="t2" class="hide" style="text-align:center; padding:10px 0;">
        <div class="qr-box" id="studentQrBox"></div>
        <p class="text-dim" style="font-size:12.5px; margin-top:10px;">يُستخدم لتسجيل الحضور بسرعة عبر الماسح</p>
      </div>
      <div id="t3" class="hide">
        ${att.slice(0,15).map(a=>`<div class="kv"><b>${Utils.fmtDate(a.date)}</b><span class="pill ${a.status==='present'?'green':'red'}">${a.status==='present'?'حاضر':'غائب'}</span></div>`).join('') || '<div class="empty-state"><div class="ic">📭</div>لا يوجد سجل حضور</div>'}
      </div>
      <div id="t4" class="hide">
        ${pays.map(p=>`<div class="kv"><b>${Utils.fmtDate(p.date)}</b><span>${Utils.money(p.amount)}</span></div>`).join('') || '<div class="empty-state"><div class="ic">📭</div>لا يوجد مدفوعات</div>'}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="window.print()">🖨️ طباعة</button>
      <button class="btn btn-primary" onclick="UI.closeModal(); Students.openForm('${id}')">تعديل البيانات</button>
    </div>`, {wide:true});

  setTimeout(()=>{
    const box = document.getElementById('studentQrBox');
    if(box && window.QRCode){ new QRCode(box, {text: 'STUDENT:'+s.code, width:130, height:130}); }
  }, 50);
};
Students._tab = function(btn, id){
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['t1','t2','t3','t4'].forEach(t=> document.getElementById(t).classList.toggle('hide', t!==id));
};
</script>

const Teachers = {};
Teachers.openForm = function(id){
  const t = id ? DB.get('teachers', id) : {};
  UI.modal(`
    <div class="modal-head"><h3>${id?'تعديل بيانات مدرس':'إضافة مدرس جديد'}</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>

        <div class="field"><label>سعر الحصة الافتراضي (ج.م)</label><input id="f_price" type="number" value="${t.pricePerSession||''}"></div>
        <div class="field full"><label>المواد (افصل بفاصلة)</label><input id="f_subjects" value="${Utils.esc((t.subjects||[]).join('، '))}" placeholder="فيزياء، كيمياء"></div>

Teachers.save = async function(id){
  const data = {
    name: document.getElementById('f_name').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    pricePerSession: Number(document.getElementById('f_price').value)||0,
    subjects: document.getElementById('f_subjects').value.split(/[،,]/).map(s=>s.trim()).filter(Boolean),
    notes: document.getElementById('f_notes').value.trim(),
  };
  if(!data.name){ UI.toast('ادخل اسم المدرس', 'err'); return; }
  if(id){ await DB.update('teachers', id, data); UI.toast('تم الحفظ'); }
  else{ await DB.add('teachers', data); UI.toast('تمت إضافة المدرس'); }
  DB.log(id?'تعديل مدرس':'إضافة مدرس', data.name);
  UI.closeModal();
};

Groups.checkConflict = function({day,startTime,endTime,teacherId,classroomId,excludeId}){
  const s1=Utils.toMinutes(startTime), e1=Utils.toMinutes(endTime);
  const overlaps = DB.list('groups').filter(g=>{
    if(g.id===excludeId) return false;
    if(g.day!==day) return false;
    const s2=Utils.toMinutes(g.startTime), e2=Utils.toMinutes(g.endTime);
    const overlap = s1 < e2 && s2 < e1;
    return overlap && (g.teacherId===teacherId || g.classroomId===classroomId);
  });
  return overlaps;
};

Groups.save = async function(id){
  const data = {
    name: document.getElementById('f_name').value.trim(),
    subject: document.getElementById('f_subject').value.trim(),
    teacherId: document.getElementById('f_teacher').value,
    classroomId: document.getElementById('f_room').value,
    day: document.getElementById('f_day').value,
    startTime: document.getElementById('f_start').value,
    endTime: document.getElementById('f_end').value,
    price: Number(document.getElementById('f_price').value)||0,
    maxStudents: Number(document.getElementById('f_max').value)||0,
  };
  if(!data.name || !data.teacherId || !data.classroomId){ UI.toast('اكمل بيانات المجموعة (الاسم/المدرس/القاعة)','err'); return; }
  if(Utils.toMinutes(data.endTime) <= Utils.toMinutes(data.startTime)){ UI.toast('وقت النهاية لازم يكون بعد وقت البداية','err'); return; }

  const conflicts = Groups.checkConflict({...data, excludeId:id});
  if(conflicts.length){
    const warn = document.getElementById('conflictWarn');
    warn.classList.remove('hide');
    warn.innerHTML = '⚠️ تعارض في الموعد مع: ' + conflicts.map(c=>Utils.esc(c.name)).join('، ') + ' — عدّل الموعد أو القاعة أو المدرس';
    return;
  }
  if(id){ await DB.update('groups', id, data); UI.toast('تم حفظ المجموعة'); }
  else{ data.studentIds={}; await DB.add('groups', data); UI.toast('تم إنشاء المجموعة'); }
  DB.log(id?'تعديل مجموعة':'إنشاء مجموعة', data.name);
  UI.closeModal();
};

<script>
/* ============================================================
   16) الحصص والحضور والغياب
   ============================================================ */
const Sessions = { date: Utils.todayISO() };

PageRenderers.sessions = function(){
  const dateISO = Sessions.date;
  const weekday = Utils.weekDay(dateISO);
  let groups = DB.list('groups').filter(g=>g.day===weekday);
  if(Auth.user.role==='teacher' && Auth.user.linkedId){ groups = groups.filter(g=>g.teacherId===Auth.user.linkedId); }

  return `
  <div class="flex gap12" style="margin-bottom:16px; flex-wrap:wrap;">
    <input type="date" value="${dateISO}" style="padding:10px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); color:var(--text);" onchange="Sessions.date=this.value; Pages.render('sessions');">
    <span class="pill blue">${weekday}</span>
    <div class="spacer"></div>
    <button class="btn btn-outline btn-sm" onclick="Sessions.date=Utils.todayISO(); Pages.render('sessions');">📅 اليوم</button>
  </div>
  <div class="grid g3">
    ${groups.length? groups.map(g=>{
      const teacher = DB.get('teachers', g.teacherId);
      const room = DB.get('classrooms', g.classroomId);
      const studentIds = g.studentIds? Object.keys(g.studentIds):[];
      const sessionId = dateISO+'_'+g.id;
      const marked = DB.list('attendance').filter(a=>a.sessionId===sessionId);
      const present = marked.filter(a=>a.status==='present').length;
      return `<div class="card" style="cursor:pointer" onclick="Sessions.openAttendance('${g.id}')">
        <div class="flex" style="justify-content:space-between;">
          <b>${Utils.esc(g.name)}</b><span class="pill blue">${Utils.esc(g.startTime)}-${Utils.esc(g.endTime)}</span>
        </div>
        <div class="text-dim" style="font-size:12.5px; margin:8px 0;">👨‍🏫 ${Utils.esc(teacher?.name||'—')} · 🏫 ${Utils.esc(room?.name||'—')}</div>
        <div class="flex" style="justify-content:space-between; align-items:center;">
          <span style="font-size:12.5px;">${marked.length}/${studentIds.length} تم تسجيلهم</span>
          <span class="pill ${present>0?'green':'gray'}">${present} حاضر</span>
        </div>
      </div>`;
    }).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="ic">📭</div>مفيش حصص مجدولة يوم ${weekday}</div>`}
  </div>`;
};

Sessions.quickCreateFromGroup = function(groupId){
  Sessions.date = Utils.todayISO();
  Pages.open('sessions');
  setTimeout(()=>Sessions.openAttendance(groupId), 200);
};

Sessions.ensureSession = async function(group, dateISO){
  const sessionId = dateISO+'_'+group.id;
  if(!DB.get('sessions', sessionId)){
    await DB.set('sessions', sessionId, {groupId:group.id, date:dateISO, startTime:group.startTime, endTime:group.endTime, classroomId:group.classroomId, teacherId:group.teacherId, status:'open'});
  }
  return sessionId;
};

Sessions.openAttendance = async function(groupId){
  const g = DB.get('groups', groupId);
  const dateISO = Sessions.date;
  const sessionId = await Sessions.ensureSession(g, dateISO);
  Sessions._renderAttendanceModal(g, sessionId);
};

Sessions._renderAttendanceModal = function(g, sessionId){
  const studentIds = g.studentIds? Object.keys(g.studentIds):[];
  const records = {};
  DB.list('attendance').filter(a=>a.sessionId===sessionId).forEach(a=> records[a.studentId]=a.status);

  UI.modal(`
    <div class="modal-head"><h3>الحضور — ${Utils.esc(g.name)}</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="flex gap8" style="margin-bottom:14px;">
        <button class="btn btn-sm btn-ghost" onclick="Sessions.markAll('${g.id}','${sessionId}','present')">✅ تحضير الكل</button>
        <button class="btn btn-sm btn-ghost" onclick="Sessions.markAll('${g.id}','${sessionId}','absent')">🚫 تغييب الكل</button>
      </div>
      ${studentIds.length? studentIds.map(sid=>{
        const st = DB.get('students', sid);
        if(!st) return '';
        const status = records[sid];
        return `<div class="notif-item" style="align-items:center;">
          <div class="ic">🎓</div>
          <div style="flex:1;"><b>${Utils.esc(st.name)}</b><div class="text-dim" style="font-size:11.5px;">${Utils.esc(st.code)}</div></div>
          <div class="flex gap8">
            <button class="btn btn-sm ${status==='present'?'btn-primary':'btn-ghost'}" onclick="Sessions.mark('${g.id}','${sessionId}','${sid}','present')">حاضر</button>
            <button class="btn btn-sm ${status==='absent'?'btn-danger':'btn-ghost'}" onclick="Sessions.mark('${g.id}','${sessionId}','${sid}','absent')">غائب</button>
          </div>
        </div>`;
      }).join('') : '<div class="empty-state"><div class="ic">🎓</div>لا يوجد طلاب في هذه المجموعة</div>'}
    </div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="UI.closeModal()">تم</button></div>`, {wide:true});
};

Sessions.mark = async function(groupId, sessionId, studentId, status){
  const g = DB.get('groups', groupId);
  const key = sessionId+'_'+studentId;
  const prev = DB.get('attendance', key);
  await DB.set('attendance', key, {sessionId, groupId, studentId, date:Sessions.date, status, markedBy:Auth.user.id});
  if(!prev || prev.status!==status){
    const st = DB.get('students', studentId);
    UI.notify({title: status==='present'?'تسجيل حضور':'تسجيل غياب', body:`${st?.name||''} ${status==='present'?'حضر':'غاب عن'} حصة ${g.name}`, role:'owner', type: status==='present'?'ok':'err'});
  }
  Sessions._renderAttendanceModal(g, sessionId);
};
Sessions.markAll = async function(groupId, sessionId, status){
  const g = DB.get('groups', groupId);
  const studentIds = g.studentIds? Object.keys(g.studentIds):[];
  for(const sid of studentIds){
    await DB.set('attendance', sessionId+'_'+sid, {sessionId, groupId, studentId:sid, date:Sessions.date, status, markedBy:Auth.user.id});
  }
  Sessions._renderAttendanceModal(g, sessionId);
};

/* ============================================================
   17) مستحقات المدرسين (تُحسب تلقائيًا من الحضور)
   ============================================================ */
const TeacherDues = {};
TeacherDues.calcDue = function(teacherId){
  const groups = DB.list('groups').filter(g=>g.teacherId===teacherId);
  const groupMap = {}; groups.forEach(g=>groupMap[g.id]=g);
  const cut = Number(centerSettings().centerCutPerStudent)||15;
  const attendance = DB.list('attendance').filter(a=> a.status==='present' && groupMap[a.groupId]);
  let totalRevenue=0;
  attendance.forEach(a=>{ totalRevenue += Number(groupMap[a.groupId].price)||0; });
  const centerShare = attendance.length * cut;
  const teacherShare = totalRevenue - centerShare;
  const paid = DB.list('teacherPayments').filter(p=>p.teacherId===teacherId).reduce((s,p)=>s+Number(p.amount||0),0);
  return {totalRevenue, centerShare, teacherShare, paid, due: Math.max(0, teacherShare-paid), sessionsCount: attendance.length};
};

PageRenderers.teacherDues = function(){
  let teachers = DB.list('teachers');
  if(Auth.user.role==='teacher' && Auth.user.linkedId) teachers = teachers.filter(t=>t.id===Auth.user.linkedId);
  const cut = Number(centerSettings().centerCutPerStudent)||15;
  return `
  <div class="card" style="margin-bottom:16px;"><span class="text-dim" style="font-size:13px;">💡 نصيب السنتر الثابت من كل حصة حضور = <b class="text-brand">${Utils.money(cut)}</b> — الباقي يذهب للمدرس. يمكن تعديل القيمة من الإعدادات.</span></div>
  <div class="table-wrap"><div style="overflow-x:auto;"><table>
  <thead><tr><th>المدرس</th><th>عدد الحصص المحسوبة</th><th>إجمالي الإيراد</th><th>نصيب السنتر</th><th>نصيب المدرس</th><th>تم صرفه</th><th>المستحق</th><th></th></tr></thead>
  <tbody>${teachers.map(t=>{
    const d = TeacherDues.calcDue(t.id);
    return `<tr><td><b>${Utils.esc(t.name)}</b></td><td>${d.sessionsCount}</td><td>${Utils.money(d.totalRevenue)}</td><td>${Utils.money(d.centerShare)}</td><td>${Utils.money(d.teacherShare)}</td><td>${Utils.money(d.paid)}</td>
    <td><span class="pill amber">${Utils.money(d.due)}</span></td>
    <td>${Auth.can('manage_payments')||Auth.user.role==='owner'?`<button class="btn btn-sm btn-primary" onclick="TeacherDues.pay('${t.id}', ${d.due})">💸 صرف مستحقات</button>`:''}</td></tr>`;
  }).join('') || '<tr><td colspan="8" class="text-dim" style="text-align:center; padding:30px;">لا يوجد مدرسين</td></tr>'}</tbody>
  </table></div></div>`;
};
TeacherDues.pay = function(teacherId, maxDue){
  const t = DB.get('teachers', teacherId);
  UI.modal(`<div class="modal-head"><h3>صرف مستحقات ${Utils.esc(t.name)}</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="field"><label>المبلغ (المستحق: ${Utils.money(maxDue)})</label><input id="f_amount" type="number" value="${maxDue}"></div>
    <div class="field"><label>ملاحظة</label><input id="f_note" placeholder="اختياري"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="UI.closeModal()">إلغاء</button><button class="btn btn-primary" onclick="TeacherDues.confirmPay('${teacherId}')">تأكيد الصرف</button></div>`);
};
TeacherDues.confirmPay = async function(teacherId){
  const amount = Number(document.getElementById('f_amount').value)||0;
  const note = document.getElementById('f_note').value.trim();
  if(amount<=0){ UI.toast('ادخل مبلغ صحيح','err'); return; }
  await DB.add('teacherPayments', {teacherId, amount, note, date:Utils.todayISO(), paidBy:Auth.user.id});
  DB.log('صرف مستحقات مدرس', teacherId);
  UI.toast('تم صرف المستحقات'); UI.closeModal();
};
</script>
<script>
/* ============================================================
   18) مدفوعات الطلاب والديون
   ============================================================ */
PageRenderers.payments = function(){
  const pays = DB.list('payments').sort((a,b)=>b.createdAt-a.createdAt).slice(0,60);
  const debtStudents = DB.list('students').filter(s=>Number(s.debt)>0).sort((a,b)=>(b.debt||0)-(a.debt||0));
  return `
  <div class="grid g3" style="margin-bottom:20px;">
    ${statCard('💰','var(--brand)','var(--brand-soft)', Utils.money(pays.reduce((s,p)=>s+Number(p.amount||0),0)), 'إجمالي آخر المدفوعات')}
    ${statCard('⚠️','var(--red)','var(--red-soft)', debtStudents.length, 'عدد الطلاب المديونين')}
    ${statCard('🧮','var(--amber)','var(--amber-soft)', Utils.money(debtStudents.reduce((s,x)=>s+Number(x.debt||0),0)), 'إجمالي الديون')}
  </div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="Payments._tab(this,'payLog')">سجل المدفوعات</button>
    <button class="tab-btn" onclick="Payments._tab(this,'payDebts')">الطلاب المديونين</button>
  </div>
  <div id="payLog">
    <div class="table-wrap">
      <div class="table-toolbar"><div class="spacer"></div><button class="btn btn-primary btn-sm" onclick="Payments.openForm()">+ تسجيل دفعة</button></div>
      ${pays.length? `<div style="overflow-x:auto;"><table><thead><tr><th>الطالب</th><th>المبلغ</th><th>التاريخ</th><th>الطريقة</th><th>ملاحظة</th></tr></thead><tbody>
      ${pays.map(p=>{ const s=DB.get('students',p.studentId); return `<tr><td><b>${Utils.esc(s?.name||'—')}</b></td><td>${Utils.money(p.amount)}</td><td>${Utils.fmtDate(p.date)}</td><td>${Utils.esc(p.method||'كاش')}</td><td>${Utils.esc(p.note||'—')}</td></tr>`; }).join('')}
      </tbody></table></div>` : `<div class="empty-state"><div class="ic">💳</div>لا يوجد مدفوعات مسجلة</div>`}
    </div>
  </div>
  <div id="payDebts" class="hide">
    <div class="table-wrap">
      ${debtStudents.length? `<div style="overflow-x:auto;"><table><thead><tr><th>الطالب</th><th>المديونية</th><th></th></tr></thead><tbody>
      ${debtStudents.map(s=>`<tr><td><b>${Utils.esc(s.name)}</b></td><td><span class="pill red">${Utils.money(s.debt)}</span></td><td><button class="btn btn-sm btn-primary" onclick="Payments.openForm('${s.id}')">تسجيل دفعة</button></td></tr>`).join('')}
      </tbody></table></div>` : `<div class="empty-state"><div class="ic">🎉</div>لا يوجد طلاب مديونين حاليًا</div>`}
    </div>
  </div>`;
};
const Payments = {};
Payments._tab = function(btn,id){ btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); ['payLog','payDebts'].forEach(t=>document.getElementById(t).classList.toggle('hide', t!==id)); };
Payments.openForm = function(studentId){
  const students = DB.list('students');
  UI.modal(`<div class="modal-head"><h3>تسجيل دفعة</h3><button class="icon-btn" onclick="UI.closeModal()">✕</button></div>
  <div class="modal-body"><div class="form-grid">
    <div class="field full"><label>الطالب</label><select id="f_student">${students.map(s=>`<option value="${s.id}" ${studentId===s.id?'selected':''}>${Utils.esc(s.name)} — ${Utils.esc(s.code)}</option>`).join('')}</select></div>
    <div class="field"><label>المبلغ المستلم</label><input id="f_amount" type="number"></div>
    <div class="field"><label>الطريقة</label><select id="f_method"><option>كاش</option><option>فودافون كاش</option><option>تحويل بنكي</option></select></div>
    <div class="field full"><label>نوع العملية</label><select id="f_type"><option value="pay">تسديد دفعة (تقليل مديونية)</option><option value="charge">تسجيل اشتراك جديد (زيادة مديونية)</option></select></div>
    <div class="field full"><label>ملاحظة</label><input id="f_note"></div>
  </div></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="UI.closeModal()">إلغاء</button><button class="btn btn-primary" onclick="Payments.save()">حفظ</button></div>`);
};
Payments.save = async function(){
  const studentId = document.getElementById('f_student').value;
  const amount = Number(document.getElementById('f_amount').value)||0;
  const method = document.getElementById('f_method').value;
  const type = document.getElementById('f_type').value;
  const note = document.getElementById('f_note').value.trim();
  if(!studentId || amount<=0){ UI.toast('اكمل البيانات المطلوبة','err'); return; }
  const s = DB.get('students', studentId);
  const currentDebt = Number(s.debt)||0;
  const newDebt = type==='pay' ? Math.max(0, currentDebt - amount) : currentDebt + amount;
  await DB.update('students', studentId, {debt:newDebt});
  if(type==='pay'){
    await DB.add('payments', {studentId, amount, method, note, date:Utils.todayISO(), receivedBy:Auth.user.id});
    UI.notify({title:'دفعة جديدة', body:`${s.name} دفع ${Utils.money(amount)}`, role:'owner', type:'ok'});
  }else{
    DB.log('تسجيل اشتراك/مديونية', `${s.name} +${amount}`);
  }
  UI.toast('تم الحفظ بنجاح');
  UI.closeModal();
};

  <div class="modal-body"><div class="form-grid">
